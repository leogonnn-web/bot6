global:
  scrape_interval: 10s
  evaluation_interval: 15s

rule_files:
  - alert_rules.yml

scrape_configs:
  - job_name: hydra_bot
    static_configs:
      # Docker: use service name; local dev: use localhost
      - targets: ['hydra-bot:9090']
        labels:
          instance: triada_main

  - job_name: hydra_arb
    static_configs:
      - targets: ['hydra-arb:9091']
        labels:
          instance: triada_arb
